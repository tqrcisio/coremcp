run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - typecheck
    - gosec

linters-settings:
  govet:
    enable-all: false
  
issues:
  exclude-dirs:
    - vendor
  exclude-files:
    - ".*_generated.go$"
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec