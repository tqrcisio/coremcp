name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Run tests
      run: go test -v ./...

    - name: Build binaries
      run: |
        echo "Building binaries for version ${GITHUB_REF#refs/tags/}"
        
        # Linux
        GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o coremcp-linux-amd64 ./cmd/coremcp
        GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o coremcp-linux-arm64 ./cmd/coremcp
        
        # macOS
        GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o coremcp-darwin-amd64 ./cmd/coremcp
        GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o coremcp-darwin-arm64 ./cmd/coremcp
        
        # Windows
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o coremcp-windows-amd64.exe ./cmd/coremcp
        
        # Checksums
        sha256sum coremcp-* > checksums.txt

    - name: Generate changelog
      id: changelog
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        if [ -z "$PREV_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
        else
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
        fi
        
        echo "## Changes in $VERSION" > release_notes.md
        echo "" >> release_notes.md
        echo "$CHANGELOG" >> release_notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ steps.changelog.outputs.version }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          coremcp-linux-amd64
          coremcp-linux-arm64
          coremcp-darwin-amd64
          coremcp-darwin-arm64
          coremcp-windows-amd64.exe
          checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: corebasehq/coremcp
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max